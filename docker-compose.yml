version: '3.8'

services:
  copilot-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Doppler bootstrap token — the only secret passed in from the host.
      # Doppler CLI uses this to fetch ANTHROPIC_API_KEY, OPENAI_API_KEY,
      # and PINECONE_API_KEY at container startup.
      - DOPPLER_TOKEN=${DOPPLER_TOKEN}
      # Non-secret config — fine to keep here
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-us-east-1}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=copilot-secret
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - PLANNER_MODEL=${PLANNER_MODEL:-phi3:mini}
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - copilot-net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Pull the planner model on first start, then keep serving
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVE_PID=$$!
        sleep 5
        echo "Pulling planner model: $${PLANNER_MODEL:-phi3:mini}"
        ollama pull $${PLANNER_MODEL:-phi3:mini} || echo "Pull failed, continuing anyway"
        wait $$SERVE_PID
    environment:
      - PLANNER_MODEL=${PLANNER_MODEL:-phi3:mini}
    networks:
      - copilot-net

  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/copilot-secret
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - copilot-net

  prometheus:
    image: prom/prometheus:v2.48.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - copilot-net

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - copilot-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3001:8080"
    environment:
      # Connect to our copilot backend as an OpenAI-compatible API
      - OPENAI_API_BASE_URL=http://copilot-app:8080/v1
      - OPENAI_API_KEY=not-needed
      # Disable Ollama since we're using our own backend
      - OLLAMA_BASE_URL=
      - ENABLE_OLLAMA_API=false
      # WebUI settings
      - WEBUI_NAME=Policy & Incident Copilot
      - WEBUI_AUTH=false
      - DEFAULT_MODELS=policy-copilot
      - ENABLE_SIGNUP=true
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - copilot-app
    networks:
      - copilot-net
    restart: unless-stopped

volumes:
  neo4j-data:
  prometheus-data:
  grafana-data:
  open-webui-data:
  ollama-data:

networks:
  copilot-net:
    driver: bridge
