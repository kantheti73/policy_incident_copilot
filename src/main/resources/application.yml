server:
  port: 8080

spring:
  application:
    name: policy-incident-copilot

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:password}

# Pinecone Configuration
pinecone:
  api-key: ${PINECONE_API_KEY:}
  environment: ${PINECONE_ENVIRONMENT:us-east-1}
  index-name: ${PINECONE_INDEX:policy-documents}
  namespace: ${PINECONE_NAMESPACE:policies}
  dimension: 384

# Copilot Configuration
copilot:
  # LLM Provider — set one API key to activate that provider
  llm:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model-name: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model-name: ${OPENAI_MODEL:gpt-4o}
    max-tokens: 4096
    temperature: 0.1
    # Lightweight local model for the Planner agent — uses Ollama sidecar
    # Set enabled=false to disable and reuse the primary model for planning
    planner:
      enabled: ${PLANNER_LOCAL_ENABLED:true}
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      model-name: ${PLANNER_MODEL:phi3:mini}
  # Token pricing for cost-tracking metrics. Keys must be lower-case model names.
  # USD per 1 million tokens. Update when providers change prices.
  llm-pricing:
    models:
      claude-sonnet-4-20250514:
        input-per-million: 3.00
        output-per-million: 15.00
      claude-opus-4-20250514:
        input-per-million: 15.00
        output-per-million: 75.00
      gpt-4o:
        input-per-million: 2.50
        output-per-million: 10.00
      gpt-4o-mini:
        input-per-million: 0.15
        output-per-million: 0.60
      phi3:mini:
        input-per-million: 0.00
        output-per-million: 0.00
      llama3.2:3b:
        input-per-million: 0.00
        output-per-million: 0.00
  routing:
    complexity-threshold: 0.6
    high-risk-keywords:
      - disable mfa
      - disable firewall
      - turn off firewall
      - ignore policy
      - bypass
      - override security
      - delete all
      - shut down
      - give me the password
      - install software
      - unverified software
      - ip address
      - network topology
  guardrails:
    max-input-length: 50000
    max-steps-single-agent: 3
    max-steps-multi-agent: 10
    pii-patterns:
      - "\\b\\d{3}-\\d{2}-\\d{4}\\b"          # SSN
      - "\\b\\d{16}\\b"                        # Credit card
      - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z]{2,}\\b"  # Email
      - "\\b\\d{3}[-.\\s]?\\d{3}[-.\\s]?\\d{4}\\b"            # Phone
      - "\\b(?:10\\.\\d{1,3}|172\\.(?:1[6-9]|2\\d|3[01])|192\\.168)\\.\\d{1,3}\\.\\d{1,3}\\b"  # Internal/private IP addresses
  memory:
    max-conversation-turns: 20
    sensitive-keywords:
      - password
      - secret
      - token
      - api-key
      - credential
  retry:
    max-attempts: 3
    backoff-ms: 1000

# Actuator / Prometheus
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.copilot: DEBUG
    dev.langchain4j: INFO
  pattern:
    console: "%d{ISO8601} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"
